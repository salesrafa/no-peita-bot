name: Deploy Apps Script

# Roda em paralelo ao deploy nativo do Railway.
# Só dispara quando o código do Apps Script (ou este workflow) muda na main,
# evitando push desnecessário quando só o app Node é alterado.
on:
  push:
    branches: [main]
    paths:
      - "apps-script/**"
      - ".github/workflows/deploy-appsscript.yml"
  # Permite rodar manualmente pela aba Actions do GitHub
  workflow_dispatch:

# Evita dois pushes concorrentes sobrescrevendo o Apps Script
concurrency:
  group: deploy-appsscript
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp e googleapis
        run: npm install -g @google/clasp@3.3.0 googleapis

      - name: Restaura credenciais do clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Secret CLASPRC_JSON não configurado." && exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Push para o Apps Script (repo é a fonte da verdade)
        working-directory: apps-script
        run: clasp push -f

      # Re-publica SEMPRE a mesma implantação (mesmo deployment ID = mesma URL).
      # Sem isso, o clasp push só atualiza o HEAD e a URL /exec continua
      # servindo o código antigo. Como o ID é fixo, a env URL do Railway
      # nunca precisa mudar.
      - name: Limpa versões antigas (mantém as 50 mais recentes)
        run: |
          node - <<'EOF'
          const { google } = require('googleapis');
          const fs = require('fs');
          const path = require('path');

          async function main() {
            const clasprc = JSON.parse(fs.readFileSync(path.join(process.env.HOME, '.clasprc.json'), 'utf8'));
            const tokens = clasprc.tokens?.default ?? clasprc.tokens ?? clasprc;
            const auth = new google.auth.OAuth2(tokens.client_id, tokens.client_secret, 'urn:ietf:wg:oauth:2.0:oob');
            auth.setCredentials(tokens);

            const script = google.script({ version: 'v1', auth });
            const scriptId = '14t6AN-Ii2GWjL9V8lNHBKRDoiNDLcI31toQ8DwH_WSsahqTAH_DYrxUh';
            const KEEP = 50;

            const res = await script.projects.versions.list({ scriptId, pageSize: 200 });
            const versions = (res.data.versions ?? []).sort((a, b) => a.versionNumber - b.versionNumber);
            const toDelete = versions.slice(0, Math.max(0, versions.length - KEEP));

            console.log(`Total de versões: ${versions.length}. Deletando ${toDelete.length}.`);
            for (const v of toDelete) {
              await script.projects.versions.delete({ scriptId, versionNumber: v.versionNumber });
              console.log(`Deletada versão ${v.versionNumber}`);
            }
          }

          main().catch(e => { console.error('Limpeza falhou (não bloqueante):', e.message); });
          EOF
        env:
          NODE_PATH: /usr/local/lib/node_modules

      - name: Redeploy (mantém a mesma URL)
        working-directory: apps-script
        env:
          DEPLOYMENT_ID: ${{ vars.DEPLOYMENT_ID }}
        run: |
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "::error::Variable DEPLOYMENT_ID não configurada (Settings → Secrets and variables → Actions → Variables)." && exit 1
          fi
          clasp update-deployment -d "deploy via github actions (${GITHUB_SHA::7})" "$DEPLOYMENT_ID"
