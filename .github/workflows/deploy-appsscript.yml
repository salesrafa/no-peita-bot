name: Deploy Apps Script

# Roda em paralelo ao deploy nativo do Railway.
# Só dispara quando o código do Apps Script (ou este workflow) muda na main,
# evitando push desnecessário quando só o app Node é alterado.
on:
  push:
    branches: [main]
    paths:
      - "apps-script/**"
      - ".github/workflows/deploy-appsscript.yml"
  # Permite rodar manualmente pela aba Actions do GitHub
  workflow_dispatch:

# Evita dois pushes concorrentes sobrescrevendo o Apps Script
concurrency:
  group: deploy-appsscript
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Restaura credenciais do clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Secret CLASPRC_JSON não configurado." && exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Push para o Apps Script (repo é a fonte da verdade)
        working-directory: apps-script
        run: clasp push -f

      # A API do Apps Script NÃO permite deletar versões (só create/get/list);
      # deletar só existe na UI web. O script tem limite de 200 versões e cada
      # deploy cria uma nova. Este step não deleta nada — só conta e avisa com
      # antecedência quando estiver perto do limite, pra dar tempo de limpar
      # manualmente em script.google.com → Histórico do projeto → "Excluir esta
      # versão". Nunca bloqueia o deploy.
      - name: Alerta de limite de versões
        run: |
          SCRIPT_ID="14t6AN-Ii2GWjL9V8lNHBKRDoiNDLcI31toQ8DwH_WSsahqTAH_DYrxUh"
          LIMITE=200
          ALERTA=180
          # Lê o token do ~/.clasprc.json, que o "clasp push" anterior já
          # renovou via refresh_token (o token do secret CLASPRC_JSON costuma
          # estar expirado, pois access_token dura ~1h).
          TOKEN=$(python3 -c "import json,os; d=json.load(open(os.path.expanduser('~/.clasprc.json'))); t=d.get('tokens',{}); print(t.get('default',t).get('access_token',''))" 2>/dev/null || true)
          if [ -z "$TOKEN" ]; then
            echo "::warning::Não foi possível extrair access_token do ~/.clasprc.json; pulando checagem de versões."
            exit 0
          fi
          TOTAL=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://script.googleapis.com/v1/projects/${SCRIPT_ID}/versions?pageSize=200" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('versions',[])))" 2>/dev/null || echo "")
          if [ -z "$TOTAL" ]; then
            echo "::warning::Falha ao listar versões (token pode ter expirado); pulando checagem."
            exit 0
          fi
          echo "Versões atuais: ${TOTAL}/${LIMITE}"
          if [ "$TOTAL" -ge "$ALERTA" ]; then
            echo "::warning::Apps Script com ${TOTAL}/${LIMITE} versões. A API não deleta versões — limpe manualmente em script.google.com → Histórico do projeto → 'Excluir esta versão' antes de atingir ${LIMITE}, senão o deploy vai falhar."
          fi

      # Re-publica SEMPRE a mesma implantação (mesmo deployment ID = mesma URL).
      # Sem isso, o clasp push só atualiza o HEAD e a URL /exec continua
      # servindo o código antigo. Como o ID é fixo, a env URL do Railway
      # nunca precisa mudar.
      - name: Redeploy (mantém a mesma URL)
        working-directory: apps-script
        env:
          DEPLOYMENT_ID: ${{ vars.DEPLOYMENT_ID }}
        run: |
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "::error::Variable DEPLOYMENT_ID não configurada (Settings → Secrets and variables → Actions → Variables)." && exit 1
          fi
          clasp update-deployment -d "deploy via github actions (${GITHUB_SHA::7})" "$DEPLOYMENT_ID"
