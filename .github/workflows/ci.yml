name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Allows running the deploy manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  # Runs on every PR and push. Also detects whether apps-script/ changed, so the
  # deploy job below knows whether to run.
  test:
    runs-on: ubuntu-latest
    outputs:
      apps_script: ${{ steps.filter.outputs.apps_script }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect apps-script changes (for the deploy gate)
        id: filter
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="$(git rev-parse HEAD^ 2>/dev/null || echo HEAD)"
          fi
          if git diff --name-only "$before" HEAD | grep -q '^apps-script/'; then
            echo "apps_script=true" >> "$GITHUB_OUTPUT"
          else
            echo "apps_script=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # package-lock.json is gitignored, so we use `npm install`; the tests
      # never launch a browser, so skip the Chromium download.
      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Run tests
        run: npm test

  # Deploys Apps Script only on a push to main (or manual run) that touched
  # apps-script/, and only after the tests pass. Runs in parallel with Railway's
  # native deploy of the Node app.
  deploy-appsscript:
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.test.outputs.apps_script == 'true') }}
    runs-on: ubuntu-latest
    # Prevents two concurrent pushes from overwriting the Apps Script
    concurrency:
      group: deploy-appsscript
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Restore clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Secret CLASPRC_JSON is not configured." && exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Push to Apps Script (the repo is the source of truth)
        working-directory: apps-script
        run: clasp push -f

      # The Apps Script API does NOT allow deleting versions (only create/get/
      # list); deleting only exists in the web UI. The script has a 200-version
      # limit and each deploy creates a new one. This step deletes nothing — it
      # just counts and warns ahead of time when approaching the limit, to give
      # time to clean up manually at script.google.com → Project history →
      # "Delete this version". Never blocks the deploy.
      - name: Version limit alert
        run: |
          SCRIPT_ID="14t6AN-Ii2GWjL9V8lNHBKRDoiNDLcI31toQ8DwH_WSsahqTAH_DYrxUh"
          LIMIT=200
          ALERT=180
          # Reads the token from ~/.clasprc.json, which the previous "clasp push"
          # already refreshed via refresh_token (the token in the CLASPRC_JSON
          # secret is usually expired, since access_token lasts ~1h).
          TOKEN=$(python3 -c "import json,os; d=json.load(open(os.path.expanduser('~/.clasprc.json'))); t=d.get('tokens',{}); print(t.get('default',t).get('access_token',''))" 2>/dev/null || true)
          if [ -z "$TOKEN" ]; then
            echo "::warning::Could not extract access_token from ~/.clasprc.json; skipping the version check."
            exit 0
          fi
          TOTAL=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://script.googleapis.com/v1/projects/${SCRIPT_ID}/versions?pageSize=200" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('versions',[])))" 2>/dev/null || echo "")
          if [ -z "$TOTAL" ]; then
            echo "::warning::Failed to list versions (token may have expired); skipping the check."
            exit 0
          fi
          echo "Current versions: ${TOTAL}/${LIMIT}"
          if [ "$TOTAL" -ge "$ALERT" ]; then
            echo "::warning::Apps Script at ${TOTAL}/${LIMIT} versions. The API can't delete versions — clean up manually at script.google.com → Project history → 'Delete this version' before reaching ${LIMIT}, or the deploy will fail."
          fi

      # Always re-publishes the SAME deployment (same deployment ID = same URL).
      # Without this, clasp push only updates HEAD and the /exec URL keeps
      # serving the old code. Since the ID is fixed, the Railway URL env never
      # needs to change.
      - name: Redeploy (keeps the same URL)
        working-directory: apps-script
        env:
          DEPLOYMENT_ID: ${{ vars.DEPLOYMENT_ID }}
        run: |
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "::error::Variable DEPLOYMENT_ID is not configured (Settings → Secrets and variables → Actions → Variables)." && exit 1
          fi
          clasp update-deployment -d "deploy via github actions (${GITHUB_SHA::7})" "$DEPLOYMENT_ID"
