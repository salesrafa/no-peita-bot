name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # package-lock.json is gitignored in this repo, so we use `npm install`.
      # Skip the Chromium download: the tests never launch a browser, they only
      # need the JS modules (whatsapp-web.js / puppeteer) to import.
      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Run tests
        run: npm test
